<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-dark" lang="en"> <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>Degs</title>
    <link rel="icon" type="image/x-icon" href="/images/avatar.png"> <!-- Update this with your own favicon -->

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="Degs — links, projects, and where to find me.">

    <!-- Keywords -->
    <meta name="keywords" content="Degs, degs.skin, links">

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://degs.skin">

    <!-- Author Information -->
    <meta name="author" content="Degs">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->

  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <div class="avatar-frame">
              <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="Degs">
            </div>

            <!-- Replace with your name or brand -->
            <h1 class="brand-title">
              <div>Degs</div>
            </h1>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">

              <!-- Bandcamp -->
              <a class="button button-bandcamp" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--tint" aria-hidden="true" style="--icon-src:url('../images/icons/bandcamp.svg');--icon-tint:#D41886"></span>Bandcamp</a>

              <!-- Discord -->
              <a class="button button-discord" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--tint" aria-hidden="true" style="--icon-src:url('../images/icons/discord.svg');--icon-tint:#FE54FF"></span>Discord</a>

              <!-- GitHub -->
              <a class="button button-github" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--tint" aria-hidden="true" style="--icon-src:url('../images/icons/github.svg');--icon-tint:#C77DFF"></span>GitHub</a>

              <!-- Ko-fi -->
              <a class="button button-ko-fi" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--tint" aria-hidden="true" style="--icon-src:url('../images/icons/ko-fi.svg');--icon-tint:#D41886"></span>Support me on Ko-fi</a>

              <!-- Letterboxd -->
              <a class="button button-letterboxd" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--tint" aria-hidden="true" style="--icon-src:url('../images/icons/letterboxd.svg');--icon-tint:#FE54FF"></span>Letterboxd</a>

              <!-- LinkedIn -->
              <a class="button button-linked" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--tint" aria-hidden="true" style="--icon-src:url('../images/icons/linkedin.svg');--icon-tint:#C77DFF"></span>LinkedIn</a>

              <!-- Steam -->
              <a class="button button-steam" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--tint" aria-hidden="true" style="--icon-src:url('../images/icons/steam.svg');--icon-tint:#D41886"></span>Steam</a>

              <!-- Venmo -->
              <a class="button button-venmo" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--tint" aria-hidden="true" style="--icon-src:url('../images/icons/venmo.svg');--icon-tint:#FE54FF"></span>Venmo</a>

              <!-- Generic Email -->
              <a class="button button-default" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--tint" aria-hidden="true" style="--icon-src:url('../images/icons/generic-email.svg');--icon-tint:#C77DFF"></span>Email Degs</a>

              <!-- Demonparty -->
              <a class="button button-default" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--emoji" aria-hidden="true">🎉</span>Demonparty</a>

              <!-- Demonspace (Roomy.space instance - placeholder until it's live) -->
              <a class="button button-default" href="#" target="_blank" rel="noopener" role="button"><span class="icon icon--tint" aria-hidden="true" style="--icon-src:url('../images/icons/generic-website.svg');--icon-tint:#FE54FF"></span>Demonspace</a>

      </div>

      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <a href="privacy.html">Privacy Policy</a> | Build your own by forking <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
      </footer>

    </div>
  </div>

</body>

</html>
